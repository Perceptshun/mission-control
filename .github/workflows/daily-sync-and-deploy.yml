name: Daily Sync Ideas & Deploy

on:
  schedule:
    # Run daily at 8:05 AM UTC (adjust timezone as needed)
    - cron: '5 8 * * *'
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1

    - name: Sync Ideas to Board
      run: bun run scripts/sync-ideas-to-board.ts

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit & Push Board Updates
      run: |
        if git diff --quiet board.md; then
          echo "No changes to board.md"
        else
          git add board.md
          git commit -m "Daily sync: Add new ideas to kanban [skip ci]"
          git push origin main
        fi

    - name: Install Dependencies
      run: cd web && bun install

    - name: Build Static Site
      run: cd web && bun run build

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'web/dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
