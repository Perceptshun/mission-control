name: Daily Sync Ideas & Deploy

on:
  schedule:
    # Run daily at 8:05 AM UTC (adjust timezone as needed)
    - cron: '5 8 * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1

    - name: Sync Ideas to Board
      run: bun run scripts/sync-ideas-to-board.ts

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit & Push Board Updates
      run: |
        if git diff --quiet board.md; then
          echo "No changes to board.md"
        else
          git add board.md
          git commit -m "Daily sync: Add new ideas to kanban [skip ci]"
          git push origin main
        fi

    - name: Install Dependencies
      run: cd web && bun install

    - name: Build Static Site
      run: cd web && bun run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: web/dist
        token: ${{ secrets.GITHUB_TOKEN }}
