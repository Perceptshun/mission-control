name: Build & Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '5 13 * * *'  # Daily at 8:05am ET (13:05 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v1
    - name: Sync ideas to mission control board
      run: bun run scripts/sync-ideas-to-board.ts
    - name: Commit and push if changes made
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add board.md
        git diff-index --quiet HEAD || git commit -m "chore: sync daily ideas to board"
        git push origin main

  build:
    needs: sync
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v1
    - run: bun install
    - run: bun run build
    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    - uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist/
